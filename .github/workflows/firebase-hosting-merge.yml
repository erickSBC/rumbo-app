name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Entra a la carpeta frontend e instala las dependencias
      - name: Install Dependencies
        run: npm ci
        working-directory: ./frontend

      # 2. Entra a la carpeta frontend y compila el proyecto
      - name: Build Project
        run: npm run build
        working-directory: ./frontend

      # 3. Despliega a producción apuntando a la subcarpeta
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RUMBOAPP_264CA }}
          channelId: live
          projectId: rumboapp-264ca
          entryPoint: ./frontend # 👈 Obligatorio para monorepos