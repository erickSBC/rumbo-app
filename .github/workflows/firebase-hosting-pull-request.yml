name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Entra a la carpeta frontend e instala las dependencias
      - name: Install Dependencies
        run: npm ci
        working-directory: ./frontend

      # 2. Entra a la carpeta frontend y compila el proyecto
      - name: Build Project
        run: npm run build
        working-directory: ./frontend

      # 3. Despliega la vista previa apuntando a la subcarpeta
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RUMBOAPP_264CA }}
          projectId: rumboapp-264ca
          entryPoint: ./frontend # 👈 Obligatorio para monorepos